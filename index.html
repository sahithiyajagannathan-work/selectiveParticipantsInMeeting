
<div style="background:#1a1a2e;padding:2rem;border-radius:12px;min-height:600px;position:relative;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;" id="root">

  <div style="background:#1e1e30;border-radius:10px;border:1px solid #2e2e45;width:540px;margin:0 auto;overflow:hidden;">

    <div style="padding:16px 24px 14px;border-bottom:1px solid #2e2e45;">
      <p style="font-size:12px;color:#8888aa;margin:0 0 2px;">#Design@cliq</p>
      <p style="font-size:16px;font-weight:500;margin:0;color:#e0e0f0;">Start meeting</p>
    </div>

    <div style="padding:18px 24px;">

      <div style="display:grid;grid-template-columns:100px 1fr;gap:14px;align-items:center;margin-bottom:16px;">
        <p style="font-size:13px;color:#8888aa;margin:0;">Topic</p>
        <input type="text" value="#design@cliq 13 july" style="font-size:13px;background:#2a2a40;border:1px solid #3a3a55;border-radius:6px;padding:7px 10px;color:#e0e0f0;width:100%;box-sizing:border-box;outline:none;" />
      </div>

      <div style="display:grid;grid-template-columns:100px 1fr;gap:14px;align-items:center;margin-bottom:16px;">
        <p style="font-size:13px;color:#8888aa;margin:0;">Host</p>
        <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid #3a3a55;border-radius:6px;background:#2a2a40;">
          <div style="width:22px;height:22px;border-radius:50%;background:#1a3a5c;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#5ab4f5;">YO</div>
          <span style="font-size:13px;color:#e0e0f0;">You</span>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:100px 1fr;gap:14px;align-items:start;margin-bottom:16px;">
        <p style="font-size:13px;color:#8888aa;margin:0;padding-top:10px;">Assign to</p>
        <div>
          <!-- Tab -->
          <div style="display:flex;align-items:center;margin-bottom:-1px;position:relative;z-index:1;">
            <div style="padding:6px 14px 8px;background:#1e1e30;border:1px solid #2e2e45;border-bottom:1px solid #1e1e30;border-radius:6px 6px 0 0;display:flex;align-items:center;gap:6px;">
              <span style="font-size:13px;font-weight:500;color:#e94d8a;">Conversation</span>
              <div style="position:relative;display:inline-flex;align-items:center;">
                <button id="lockBtn" onclick="toggleLock()" onmouseenter="showTip('Lock meeting',this)" onmouseleave="hideTip()"
                  style="background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;justify-content:center;border-radius:4px;">
                  <svg id="lockIcon" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#555577" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Conversation box -->
          <div style="border:1px solid #2e2e45;border-radius:0 6px 6px 6px;overflow:visible;background:#252538;">

            <div style="padding:9px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2e2e45;">
              <!-- Channel icon -->
              <div style="width:28px;height:28px;border-radius:50%;background:#2a3a5a;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5ab4f5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
              </div>
              <span style="font-size:13px;font-weight:500;color:#e0e0f0;flex:1;">#Design@cliq</span>

              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;flex-shrink:0;">
                <input type="checkbox" id="allMembersCheck" checked onchange="onAllMembersChange(this)" style="accent-color:#e94d8a;cursor:pointer;width:14px;height:14px;" />
                <span style="font-size:12px;color:#8888aa;">All members</span>
              </label>

              <!-- Vertical separator -->
              <div style="width:1px;height:18px;background:#3a3a55;flex-shrink:0;"></div>

              <!-- Add user icon — using SVG for reliable rendering -->
              <button id="addBtn" onclick="openExternalPicker()" onmouseenter="showTip('Add people outside #Design@cliq',this)" onmouseleave="hideTip()"
                style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;border:1px solid #4a4a66;background:#2a2a42;cursor:pointer;flex-shrink:0;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaaacc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                  <line x1="19" y1="8" x2="19" y2="14"></line>
                  <line x1="22" y1="11" x2="16" y2="11"></line>
                </svg>
              </button>
            </div>

            <!-- Avatar row -->
            <div id="avatarRow" style="display:none;padding:8px 12px;align-items:center;gap:4px;flex-wrap:wrap;border-bottom:1px solid #2e2e45;"></div>

          </div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:100px 1fr;gap:14px;align-items:center;margin-bottom:16px;">
        <p style="font-size:13px;color:#8888aa;margin:0;">Mode</p>
        <div style="display:flex;gap:8px;">
          <button style="display:flex;align-items:center;gap:6px;padding:6px 14px;background:#1a3a2a;color:#2ecc71;border:1px solid #2ecc7150;border-radius:6px;font-size:13px;cursor:pointer;">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
            Video
          </button>
          <button style="display:flex;align-items:center;gap:6px;padding:6px 14px;background:#252538;color:#8888aa;border:1px solid #3a3a55;border-radius:6px;font-size:13px;cursor:pointer;">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.56 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            Audio
          </button>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:100px 1fr;gap:14px;align-items:center;">
        <p style="font-size:13px;color:#8888aa;margin:0;">Recording</p>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <div id="recToggle" style="width:32px;height:18px;background:#2ecc71;border-radius:9px;position:relative;cursor:pointer;" onclick="toggleRec()">
            <div id="recKnob" style="width:14px;height:14px;background:white;border-radius:50%;position:absolute;top:2px;right:2px;transition:right 0.15s;"></div>
          </div>
          <span style="font-size:12px;color:#8888aa;">Record this call for participants</span>
        </label>
      </div>
    </div>

    <div style="padding:14px 24px;border-top:1px solid #2e2e45;display:flex;justify-content:flex-end;gap:8px;">
      <button style="padding:7px 18px;font-size:13px;border-radius:6px;cursor:pointer;background:#252538;border:1px solid #3a3a55;color:#e0e0f0;">Cancel</button>
      <button style="padding:7px 18px;font-size:13px;background:#2ecc71;color:#0a1a0a;border:none;border-radius:6px;cursor:pointer;font-weight:500;">Start meeting</button>
    </div>
  </div>

  <!-- Global tooltip -->
  <div id="globalTooltip" style="display:none;position:absolute;background:#111122;color:#e0e0f0;font-size:11px;padding:4px 8px;border-radius:4px;white-space:nowrap;z-index:9999;pointer-events:none;border:1px solid #3a3a55;"></div>

  <!-- Picker overlay -->
  <div id="pickerOverlay" style="display:none;position:absolute;inset:0;background:rgba(0,0,0,0.6);border-radius:12px;align-items:flex-start;justify-content:center;padding-top:60px;z-index:100;">
    <div style="background:#1e1e30;border-radius:10px;border:1px solid #2e2e45;width:440px;overflow:hidden;">
      <div style="padding:14px 20px 12px;border-bottom:1px solid #2e2e45;display:flex;align-items:center;justify-content:space-between;">
        <p id="pickerTitle" style="font-size:14px;font-weight:500;margin:0;color:#e0e0f0;"></p>
        <button onclick="cancelPicker()" style="background:none;border:none;cursor:pointer;padding:0;color:#8888aa;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div style="padding:10px 20px;border-bottom:1px solid #2e2e45;">
        <div style="position:relative;">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8888aa" stroke-width="2" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="pickerSearch" placeholder="Search by name or email" style="font-size:13px;width:100%;box-sizing:border-box;padding:7px 10px 7px 32px;background:#252538;border:1px solid #3a3a55;border-radius:6px;color:#e0e0f0;outline:none;" oninput="renderPickerList(this.value)" />
        </div>
      </div>
      <div id="memberList" style="max-height:240px;overflow-y:auto;"></div>
      <div style="padding:12px 20px;border-top:1px solid #2e2e45;display:flex;align-items:center;justify-content:space-between;">
        <div id="pickerFooterAvatars" style="display:flex;align-items:center;gap:2px;"></div>
        <div style="display:flex;gap:8px;">
          <button onclick="cancelPicker()" style="padding:6px 16px;font-size:13px;border-radius:6px;cursor:pointer;background:#252538;border:1px solid #3a3a55;color:#e0e0f0;">Cancel</button>
          <button onclick="applyPicker()" style="padding:6px 16px;font-size:13px;background:#2ecc71;color:#0a1a0a;border:none;border-radius:6px;cursor:pointer;font-weight:500;">Add</button>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
#memberList::-webkit-scrollbar{width:4px}
#memberList::-webkit-scrollbar-thumb{background:#3a3a55;border-radius:4px}
.mrow{display:flex;align-items:center;gap:12px;padding:9px 20px;cursor:pointer;border-bottom:1px solid #2e2e45;}
.mrow:hover{background:#252538;}
.mrow:last-child{border-bottom:none;}
</style>

<script>
const channelMembers = [
  {id:1,name:'Balakrishnan',email:'bala@example.com',bg:'#1a2a4a',color:'#5ab4f5',initial:'B'},
  {id:2,name:'Saravandurai',email:'sara@example.com',bg:'#3a2a1a',color:'#f5a45a',initial:'S'},
  {id:3,name:'Alan',email:'alan@example.com',bg:'#1a3a2a',color:'#5af5a4',initial:'A'},
  {id:4,name:'Prabha',email:'prabha@example.com',bg:'#3a1a2a',color:'#f55a8a',initial:'P'},
  {id:5,name:'Colleen Watson',email:'colleen@example.com',bg:'#1a2a4a',color:'#5ab4f5',initial:'C'},
  {id:6,name:'James Parker',email:'james@example.com',bg:'#3a2a1a',color:'#f5a45a',initial:'J'},
  {id:7,name:'Meera Nair',email:'meera@example.com',bg:'#1a3a2a',color:'#5af5a4',initial:'M'},
];
const orgMembers = [
  {id:8,name:'Rajan Pillai',email:'rajan@example.com',bg:'#1a2a4a',color:'#5ab4f5',initial:'R'},
  {id:9,name:'Divya S',email:'divya@example.com',bg:'#3a2a1a',color:'#f5a45a',initial:'D'},
  {id:10,name:'Tom Hughes',email:'tom@example.com',bg:'#1a3a2a',color:'#5af5a4',initial:'T'},
];

let channelSelected = new Set(channelMembers.map(m=>m.id));
let externalSelected = new Set();
let tempSelected = new Set();
let pickerMode = 'channel';
let lockOn = false;

const tip = document.getElementById('globalTooltip');
function showTip(text, el){
  const r = el.getBoundingClientRect();
  const rootR = document.getElementById('root').getBoundingClientRect();
  tip.textContent = text;
  tip.style.display = 'block';
  tip.style.top = (r.top - rootR.top - 30) + 'px';
  tip.style.left = (r.left - rootR.left + r.width/2) + 'px';
  tip.style.transform = 'translateX(-50%)';
}
function hideTip(){ tip.style.display='none'; }

function toggleLock(){
  lockOn = !lockOn;
  const icon = document.getElementById('lockIcon');
  if(lockOn){
    icon.setAttribute('stroke','#e94d8a');
    icon.querySelector('path').setAttribute('d','M7 11V7a5 5 0 0 1 10 0v4');
  } else {
    icon.setAttribute('stroke','#555577');
    icon.querySelector('path').setAttribute('d','M7 11V7a5 5 0 0 1 9.9-1');
  }
  hideTip();
}

function onAllMembersChange(cb){
  if(!cb.checked){
    channelSelected.clear();
    openChannelPicker();
  } else {
    channelSelected = new Set(channelMembers.map(m=>m.id));
    renderAvatarRow();
  }
}

function openChannelPicker(){
  pickerMode='channel';
  tempSelected=new Set(channelSelected);
  document.getElementById('pickerTitle').textContent='Select members · #Design@cliq';
  document.getElementById('pickerSearch').value='';
  renderPickerList('');
  document.getElementById('pickerOverlay').style.display='flex';
}

function openExternalPicker(){
  pickerMode='org';
  tempSelected=new Set(externalSelected);
  document.getElementById('pickerTitle').textContent='Add people outside #Design@cliq';
  document.getElementById('pickerSearch').value='';
  renderPickerList('');
  document.getElementById('pickerOverlay').style.display='flex';
}

function cancelPicker(){
  if(pickerMode==='channel' && channelSelected.size===0){
    document.getElementById('allMembersCheck').checked=true;
    channelSelected=new Set(channelMembers.map(m=>m.id));
  }
  document.getElementById('pickerOverlay').style.display='none';
  renderAvatarRow();
}

function applyPicker(){
  if(pickerMode==='channel'){
    channelSelected=new Set(tempSelected);
    document.getElementById('allMembersCheck').checked = channelSelected.size===channelMembers.length;
  } else {
    externalSelected=new Set(tempSelected);
  }
  document.getElementById('pickerOverlay').style.display='none';
  renderAvatarRow();
}

function renderAvatarRow(){
  const row = document.getElementById('avatarRow');
  const allChecked = document.getElementById('allMembersCheck').checked;
  const chMembers = allChecked ? [] : channelMembers.filter(m=>channelSelected.has(m.id));
  const extMembers = orgMembers.filter(m=>externalSelected.has(m.id));
  const allVisible = [...chMembers,...extMembers];

  if(allChecked && externalSelected.size===0){ row.style.display='none'; return; }
  if(allVisible.length===0){ row.style.display='none'; return; }

  row.style.display='flex';
  const maxShow=12, show=allVisible.slice(0,maxShow), extra=allVisible.length-maxShow;
  row.innerHTML = show.map((m,i)=>`
    <div title="${m.name}" style="width:28px;height:28px;border-radius:50%;background:${m.bg};color:${m.color};border:2px solid #1e1e30;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;margin-right:-6px;z-index:${50-i};position:relative;flex-shrink:0;cursor:default;">${m.initial}</div>
  `).join('') +
  (extra>0?`<div style="width:28px;height:28px;border-radius:50%;background:#2a2a40;color:#8888aa;border:2px solid #1e1e30;display:flex;align-items:center;justify-content:center;font-size:10px;margin-right:0;z-index:0;position:relative;flex-shrink:0;">+${extra}</div>`:'') +
  `<button onclick="openChannelPicker()" style="margin-left:14px;font-size:12px;color:#e94d8a;background:none;border:none;cursor:pointer;padding:0;flex-shrink:0;">Edit</button>`;
}

function renderPickerList(filter){
  const pool = pickerMode==='channel'?channelMembers:orgMembers;
  const filtered = pool.filter(m=>m.name.toLowerCase().includes(filter.toLowerCase())||m.email.toLowerCase().includes(filter.toLowerCase()));
  document.getElementById('memberList').innerHTML = filtered.map(m=>`
    <div class="mrow" onclick="toggleTemp(${m.id})">
      <input type="checkbox" ${tempSelected.has(m.id)?'checked':''} style="accent-color:#e94d8a;pointer-events:none;width:14px;height:14px;" />
      <div style="width:30px;height:30px;border-radius:50%;background:${m.bg};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:${m.color};flex-shrink:0;">${m.initial}</div>
      <div>
        <p style="font-size:13px;font-weight:500;margin:0;color:#e0e0f0;">${m.name}</p>
        <p style="font-size:11px;color:#8888aa;margin:0;">${m.email}</p>
      </div>
    </div>
  `).join('');
  updatePickerFooter();
}

function toggleTemp(id){
  tempSelected.has(id)?tempSelected.delete(id):tempSelected.add(id);
  renderPickerList(document.getElementById('pickerSearch').value);
}

function updatePickerFooter(){
  const pool = pickerMode==='channel'?channelMembers:orgMembers;
  const selected = pool.filter(m=>tempSelected.has(m.id));
  const row = document.getElementById('pickerFooterAvatars');
  const show = selected.slice(0,4);
  row.innerHTML = show.map((m,i)=>`
    <div style="width:24px;height:24px;border-radius:50%;background:${m.bg};border:2px solid #1e1e30;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:${m.color};margin-right:${i<show.length-1?'-8px':'0'};z-index:${10-i};">${m.initial}</div>
  `).join('') + (selected.length>0
    ?`<span style="font-size:12px;color:#8888aa;margin-left:${show.length>1?'14px':'8px'};">${selected.length} selected</span>`
    :`<span style="font-size:12px;color:#8888aa;">No one selected</span>`);
}

function toggleRec(){
  const knob=document.getElementById('recKnob'),bg=document.getElementById('recToggle');
  const on=knob.style.right==='2px';
  knob.style.right=on?'16px':'2px';
  bg.style.background=on?'#3a3a55':'#2ecc71';
}
</script>
